services:
  db:
    container_name: postgres-aerowebapi
    image: postgres:16
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aerodb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5333:5432"

volumes:
  db_data:

